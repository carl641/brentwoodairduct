  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <g opacity="0.5" fill="none" stroke="#2a97e6" stroke-width="2">
    <circle cx="1250" cy="230" r="120"/>
    <circle cx="1250" cy="230" r="200"/>
    <circle cx="1250" cy="230" r="290"/>
  </g>
  <g opacity="0.14" stroke="#ffffff" stroke-width="1.5">
