    <line x1="220" y1="360" x2="220" y2="450" stroke="#5f86ab" stroke-width="3"/>
    <line x1="320" y1="360" x2="320" y2="450" stroke="#5f86ab" stroke-width="3"/>
    <line x1="420" y1="360" x2="420" y2="450" stroke="#5f86ab" stroke-width="3"/>
    <line x1="520" y1="360" x2="520" y2="450" stroke="#5f86ab" stroke-width="3"/>
    <path d="M640 405 q80 0 80 -80 v-120" fill="none" stroke="#5f86ab" stroke-width="70" stroke-linecap="round" opacity="0.5"/>
  </g>
  <g opacity="0.5" fill="#2a97e6">
