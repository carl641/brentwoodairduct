<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2a4a"/>
      <stop offset="1" stop-color="#12609e"/>
    </linearGradient>
    <linearGradient id="duct" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5a7a"/>
      <stop offset="1" stop-color="#1f3c5a"/>
